services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: smartbill
      POSTGRES_PASSWORD: smartbill
      POSTGRES_DB: smartbill
    ports:
      - "5432:5432"
    volumes:
      - smartbill_pg:/var/lib/postgresql/data

  ai-service:
    build:
      context: ./ai-service
    ports:
      - "8001:8001"

  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://smartbill:smartbill@postgres:5432/smartbill?schema=public
      AI_SERVICE_URL: http://ai-service:8001
      FRONTEND_URL: http://localhost:3000
      BACKEND_URL: http://localhost:8080
      PORT: 8080
    depends_on:
      - postgres
      - ai-service
    ports:
      - "8080:8080"
    command: sh -c "npx prisma migrate deploy && npm run start"

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_BACKEND_URL: http://localhost:8080
    depends_on:
      - backend
    ports:
      - "3000:3000"

  prometheus:
    image: prom/prometheus:v2.55.1
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:11.2.2
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

volumes:
  smartbill_pg:
  grafana_data:

