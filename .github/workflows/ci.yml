name: ci

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install backend deps
        working-directory: SmartBill-AI/backend
        run: npm ci || npm install

      - name: Install frontend deps
        working-directory: SmartBill-AI/frontend
        run: npm ci || npm install

      - name: Backend lint + build
        working-directory: SmartBill-AI/backend
        run: |
          npm run lint
          npm run build

      - name: Frontend lint + build
        working-directory: SmartBill-AI/frontend
        run: |
          npm run lint
          npm run build

      - name: Docker build (backend)
        run: docker build -t smartbill-backend:ci SmartBill-AI/backend

      - name: Docker build (frontend)
        run: docker build -t smartbill-frontend:ci SmartBill-AI/frontend

      - name: Docker build (ai-service)
        run: docker build -t smartbill-ai-service:ci SmartBill-AI/ai-service

